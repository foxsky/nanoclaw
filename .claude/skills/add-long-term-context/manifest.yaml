conflicts: []
depends: []                                          # no skill dependencies — uses OLLAMA_HOST from .env independently
test: "npx vitest run src/context-service.test.ts && npx vitest run src/context-sync.test.ts && cd container/agent-runner && npx vitest run src/context-reader.test.ts"
