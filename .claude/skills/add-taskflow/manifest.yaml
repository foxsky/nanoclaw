skill: taskflow
version: 2.4.0
description: "Kanban+GTD task management with MCP tool engine"
core_version: 1.2.12
adds:
  # Container-side engine
  - container/agent-runner/src/taskflow-engine.ts
  - container/agent-runner/src/taskflow-engine.test.ts
  - container/agent-runner/src/runtime-config.ts
  - container/agent-runner/src/runtime-config.test.ts
  - container/agent-runner/src/ipc-tooling.ts
  - container/agent-runner/src/mcp-plugins/create-group.ts
  # Host-side IPC plugins
  - src/ipc-plugins/provision-shared.ts
  - src/ipc-plugins/provision-root-board.ts
  - src/ipc-plugins/provision-child-board.ts
  - src/ipc-plugins/provision-child-board.test.ts
  - src/ipc-plugins/create-group.ts
  - src/ipc-plugins/create-group.test.ts
  # Host-side TaskFlow support
  - src/dm-routing.ts
  - src/taskflow-embedding-sync.ts
  - src/taskflow-db.ts
  - src/taskflow-db.test.ts
  - src/migrate-to-sqlite.ts
  - src/migrate-to-sqlite.test.ts
  - src/agent-runner-ipc-tooling.test.ts
  # Utility scripts (TaskFlow group debugging/fixing)
  - src/whatsapp-add-participants.ts
  - src/whatsapp-check-groups.ts
  - src/whatsapp-fix-groups.ts
modifies:
  - container/Dockerfile
  - container/agent-runner/src/ipc-mcp-stdio.ts
  - container/agent-runner/src/index.ts
  - src/channels/whatsapp.ts
  - src/config.ts
  - src/container-runner.ts
  - src/container-runner.test.ts
  - src/db.ts
  - src/index.ts
  - src/ipc.ts
  - src/router.ts
  - src/container-runtime.ts
  - src/group-queue.ts
  - src/task-scheduler.ts
  - src/types.ts
templates:
  - templates/CLAUDE.md.template
structured:
  npm_dependencies:
    better-sqlite3: "^11.8.1"
  npm_dev_dependencies:
    "@types/better-sqlite3": "^7.6.13"
    vitest: "^4.0.18"
depends: []
post_apply:
  - "cd container/agent-runner && npm install"
  - "./container/build.sh"
test: "cd container/agent-runner && npx vitest run src/taskflow-engine.test.ts"
