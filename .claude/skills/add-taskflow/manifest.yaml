skill: taskflow
version: 2.0.0
description: "Kanban+GTD task management with MCP tool engine"
core_version: 0.1.0
adds:
  - container/agent-runner/src/taskflow-engine.ts
  - container/agent-runner/src/taskflow-engine.test.ts
modifies:
  - src/taskflow-db.ts
  - container/Dockerfile
  - container/agent-runner/src/ipc-mcp-stdio.ts
  - container/agent-runner/src/runtime-config.ts
  - src/container-runner.ts
  - src/channels/whatsapp.ts      # intent-only: adds resolvePhoneJid method
  - src/config.ts                 # intent-only: adds buildTriggerPattern function
  - src/index.ts                  # intent-only: per-group trigger + resolvePhoneJid wiring
  - src/ipc.ts                    # intent-only: adds resolvePhoneJid to IpcDeps
  - src/ipc-plugins/create-group.ts          # intent-only: resolve JIDs before group creation
  - src/ipc-plugins/provision-child-board.ts # intent-only: resolve JID for child board
structured:
  npm_dependencies:
    better-sqlite3: "^12.6.2"
  npm_dev_dependencies:
    "@types/better-sqlite3": "^7.6.13"
    vitest: "^4.0.18"
depends: []
post_apply:
  - "cd container/agent-runner && npm install"
  - "./container/build.sh"
test: "cd container/agent-runner && npx vitest run src/taskflow-engine.test.ts"
