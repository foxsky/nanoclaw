name: Skill Branch CI

# Path-A skill branch CI for our v2 fork — runs the same matrix as upstream's
# main-branch CI (pnpm@10.33.0 + bun 1.3.12 + node 20) but on every push to
# `skill/*-v2` branches, the pre-merged release branch, and the v2 anchor.
#
# Codex review #8 IMPORTANT-1 + Discovery 18: v2's stack is pnpm + bun, NOT npm.

on:
  push:
    branches:
      - 'skill/*-v2'
      - 'release/taskflow-bundle-v2'
      - 'base/v2-fork-anchor'
  pull_request:
    branches:
      - 'release/taskflow-bundle-v2'
      - 'base/v2-fork-anchor'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: pnpm install --frozen-lockfile
      - name: Install agent-runner deps (Bun)
        working-directory: container/agent-runner
        run: bun install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck host
        run: pnpm exec tsc --noEmit

      - name: Typecheck container
        run: pnpm exec tsc -p container/agent-runner/tsconfig.json --noEmit

      - name: Host tests
        run: pnpm exec vitest run

      - name: Container tests
        working-directory: container/agent-runner
        run: bun test
